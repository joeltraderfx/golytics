name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Todo dia às 09:00 (horário de Brasília, UTC-3) = 12:00 UTC.
    # Rebuilda o site com dados atualizados de classificação e próximos jogos,
    # mesmo sem nenhum commit novo — mantém o conteúdo de SEO sempre fresco.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm install
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
